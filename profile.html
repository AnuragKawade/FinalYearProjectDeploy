<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .profile-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .profile-header h1 { font-size: 28px; color: #333; }
        .back-btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        .profile-photo-section { text-align: center; margin-bottom: 40px; }
        .profile-photo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid #667eea; margin-bottom: 15px; }
        .photo-upload { display: none; }
        .upload-btn { padding: 10px 20px; background: #4facfe; color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        .form-section { margin-bottom: 30px; }
        .form-section h3 { margin-bottom: 20px; color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        
        .btn-primary { padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-danger { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        
        .success-msg, .error-msg { padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .success-msg { background: #d4edda; color: #155724; }
        .error-msg { background: #f8d7da; color: #721c24; }
        
        .stats-section { margin-top: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 12px; text-align: center; color: white; }
        .stat-box h4 { font-size: 14px; margin-bottom: 10px; opacity: 0.9; }
        .stat-box .value { font-size: 32px; font-weight: bold; }
        
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-card { background: #f8f9fa; padding: 20px; border-radius: 12px; }
        .chart-card h3 { margin-bottom: 15px; color: #333; font-size: 18px; }
        .chart-container { height: 300px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <h1>👤 My Profile</h1>
                <button onclick="window.location.href='index.html'" class="back-btn">← Back</button>
            </div>

            <div class="success-msg" id="success-msg"></div>
            <div class="error-msg" id="error-msg"></div>

            <div class="profile-photo-section">
                <img src="https://ui-avatars.com/api/?name=User&size=150&background=667eea&color=fff" id="profile-photo" class="profile-photo">
                <br>
                <input type="file" id="photo-upload" class="photo-upload" accept="image/*">
                <button onclick="document.getElementById('photo-upload').click()" class="upload-btn">📷 Change Photo</button>
            </div>

            <div class="form-section">
                <h3>Personal Information</h3>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" readonly style="background: #f5f5f5;">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob">
                </div>
                <button onclick="updateProfile()" class="btn-primary">💾 Save Changes</button>
            </div>

            <div class="stats-section">
                <h2 style="margin-bottom: 20px; color: #333;">📊 Attention Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <h4>Today</h4>
                        <div class="value" id="today-avg">0%</div>
                    </div>
                    <div class="stat-box">
                        <h4>This Week</h4>
                        <div class="value" id="week-avg">0%</div>
                    </div>
                    <div class="stat-box">
                        <h4>This Month</h4>
                        <div class="value" id="month-avg">0%</div>
                    </div>
                </div>
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>📈 Weekly Attention Trend</h3>
                        <div class="chart-container">
                            <canvas id="weekly-chart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <h3>🥧 Attention Distribution</h3>
                        <div class="chart-container">
                            <canvas id="pie-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        let currentProfilePhoto = '';

        async function loadProfile() {
            try {
                const response = await fetch(`${window.API_BASE_URL}/api/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('username').value = data.user.username;
                    document.getElementById('email').value = data.user.email;
                    if (data.user.dateOfBirth) {
                        document.getElementById('dob').value = data.user.dateOfBirth.split('T')[0];
                    }
                    if (data.user.profilePhoto) {
                        document.getElementById('profile-photo').src = data.user.profilePhoto;
                        currentProfilePhoto = data.user.profilePhoto;
                    } else {
                        document.getElementById('profile-photo').src = `https://ui-avatars.com/api/?name=${data.user.username}&size=150&background=667eea&color=fff`;
                    }
                }
            } catch (error) {
                showError('Failed to load profile');
            }
        }

        document.getElementById('photo-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profile-photo').src = e.target.result;
                    currentProfilePhoto = e.target.result;
                    updateProfilePhoto();
                };
                reader.readAsDataURL(file);
            }
        });

        async function updateProfilePhoto() {
            try {
                const response = await fetch(`${window.API_BASE_URL}/api/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ profilePhoto: currentProfilePhoto })
                });
                const data = await response.json();
                if (data.success) {
                    showSuccess('Profile photo updated!');
                }
            } catch (error) {
                showError('Failed to update photo');
            }
        }

        async function updateProfile() {
            const username = document.getElementById('username').value;
            const dateOfBirth = document.getElementById('dob').value;

            try {
                const response = await fetch(`${window.API_BASE_URL}/api/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, dateOfBirth, profilePhoto: currentProfilePhoto })
                });

                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('username', username);
                    showSuccess('Profile updated successfully!');
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('Failed to update profile');
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('success-msg');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function showError(message) {
            const el = document.getElementById('error-msg');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        loadProfile();

        async function loadStats() {
            try {
                const response = await fetch(`${window.API_BASE_URL}/api/sessions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    calculateStats(data.sessions);
                    createCharts(data.sessions);
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        function calculateStats(sessions) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            const monthAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);

            const todaySessions = sessions.filter(s => new Date(s.startTime) >= today);
            const weekSessions = sessions.filter(s => new Date(s.startTime) >= weekAgo);
            const monthSessions = sessions.filter(s => new Date(s.startTime) >= monthAgo);

            const todayAvg = todaySessions.length ? todaySessions.reduce((sum, s) => sum + s.averageAttention, 0) / todaySessions.length : 0;
            const weekAvg = weekSessions.length ? weekSessions.reduce((sum, s) => sum + s.averageAttention, 0) / weekSessions.length : 0;
            const monthAvg = monthSessions.length ? monthSessions.reduce((sum, s) => sum + s.averageAttention, 0) / monthSessions.length : 0;

            document.getElementById('today-avg').textContent = Math.round(todayAvg) + '%';
            document.getElementById('week-avg').textContent = Math.round(weekAvg) + '%';
            document.getElementById('month-avg').textContent = Math.round(monthAvg) + '%';
        }

        function createCharts(sessions) {
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            const weekSessions = sessions.filter(s => new Date(s.startTime) >= weekAgo);

            // Weekly bar chart
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dailyData = new Array(7).fill(0);
            const dailyCount = new Array(7).fill(0);

            weekSessions.forEach(s => {
                const day = new Date(s.startTime).getDay();
                dailyData[day] += s.averageAttention;
                dailyCount[day]++;
            });

            const avgData = dailyData.map((sum, i) => dailyCount[i] ? sum / dailyCount[i] : 0);

            new Chart(document.getElementById('weekly-chart'), {
                type: 'bar',
                data: {
                    labels: days,
                    datasets: [{
                        label: 'Average Attention (%)',
                        data: avgData,
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 100 }
                    }
                }
            });

            // Pie chart
            const high = sessions.filter(s => s.averageAttention >= 75).length;
            const medium = sessions.filter(s => s.averageAttention >= 50 && s.averageAttention < 75).length;
            const low = sessions.filter(s => s.averageAttention < 50).length;

            new Chart(document.getElementById('pie-chart'), {
                type: 'doughnut',
                data: {
                    labels: ['High (75-100%)', 'Medium (50-74%)', 'Low (0-49%)'],
                    datasets: [{
                        data: [high, medium, low],
                        backgroundColor: ['#4CAF50', '#FFC107', '#F44336'],
                        borderWidth: 3,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        loadStats();
    </script>
</body>
</html>
