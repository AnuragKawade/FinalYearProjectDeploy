<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Attention Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .header h1 {
            font-size: 36px;
            color: #00d9ff;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .header p { color: #505050; font-size: 16px; }
        
        .leaderboard-card {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
        }
        .podium-item {
            text-align: center;
            background: linear-gradient(135deg, #e0e0e0 0%, #d0d0d0 100%);
            padding: 30px 20px;
            border-radius: 15px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            min-width: 150px;
            transition: transform 0.3s;
        }
        .podium-item:hover { transform: translateY(-10px); }
        .podium-item.first {
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            order: 2;
            padding: 40px 20px;
            border-color: #00d9ff;
        }
        .podium-item.second {
            background: linear-gradient(135deg, #e0e0e0 0%, #d0d0d0 100%);
            order: 1;
            border-color: #808080;
        }
        .podium-item.third {
            background: linear-gradient(135deg, #d0d0d0 0%, #c0c0c0 100%);
            order: 3;
            border-color: #a0a0a0;
        }
        .medal { font-size: 48px; margin-bottom: 10px; }
        .podium-name { font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #0a0a0a; }
        .podium-score { font-size: 24px; font-weight: bold; color: #00d9ff; }
        .podium-stats { font-size: 12px; color: #505050; margin-top: 10px; }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        th, td {
            padding: 16px;
            text-align: left;
            color: #0a0a0a;
        }
        th {
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        th:first-child { border-radius: 10px 0 0 0; }
        th:last-child { border-radius: 0 10px 0 0; }
        
        tbody tr {
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            transition: background 0.2s;
        }
        tbody tr:hover { background: rgba(0, 217, 255, 0.1); }
        
        .rank {
            font-weight: bold;
            font-size: 18px;
            color: #00d9ff;
        }
        .badge-icon {
            display: inline-block;
            margin: 0 2px;
            font-size: 18px;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #00d9ff;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            transition: all 0.3s;
            margin-top: 20px;
            border: 2px solid #00d9ff;
        }
        .back-btn:hover { 
            background: #33e3ff;
            border-color: #33e3ff;
            transform: translateY(-2px);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .leaderboard-card { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Leaderboard</h1>
            <p>Top performers ranked by average attention score</p>
        </div>

        <div class="leaderboard-card">
            <div class="podium" id="podium"></div>
            
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Username</th>
                        <th>Level</th>
                        <th>Avg Attention</th>
                        <th>Points</th>
                        <th>Streak</th>
                        <th>Sessions</th>
                        <th>Badges</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-tbody"></tbody>
            </table>
            
            <center><a href="index.html" class="back-btn">Back to Dashboard</a></center>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            alert('Please login first');
            window.location.href = 'login.html';
        }

        const badges = {
            '7-day-streak': 'Streak',
            '30-day-streak': 'Long Streak',
            'focus-master': 'Focus Master',
            'perfect-score': 'Perfect',
            '1k-points': '1K Points',
            '5k-points': '5K Points',
            'dedicated': 'Dedicated',
            'veteran': 'Veteran',
            '10-hour-club': '10 Hour Club',
            'level-10': 'Level 10'
        };

        async function loadLeaderboard() {
            const podium = document.getElementById('podium');
            const tbody = document.getElementById('leaderboard-tbody');
            
            podium.innerHTML = '<p style="text-align:center;color:#666;">Loading...</p>';
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#666;">Loading leaderboard...</td></tr>';
            
            try {
                const res = await fetch('http://localhost:3000/api/leaderboard', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                console.log('Leaderboard API Response:', data);
                console.log('Total users:', data.leaderboard?.length);
                
                if (data.success) {
                    displayPodium(data.leaderboard.slice(0, 3));
                    displayLeaderboard(data.leaderboard);
                }
            } catch (error) {
                console.error('Error loading leaderboard:', error);
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#f44336;">Error loading data. Please refresh.</td></tr>';
            }
        }

        function displayPodium(top3) {
            const podium = document.getElementById('podium');
            if (top3.length === 0) {
                podium.innerHTML = '<p style="text-align:center;color:#666;">No data yet. Start tracking to appear on the leaderboard!</p>';
                return;
            }
            
            const positions = ['first', 'second', 'third'];
            const medals = ['1st', '2nd', '3rd'];
            
            podium.innerHTML = top3.map((user, i) => `
                <div class="podium-item ${positions[i]}">
                    <div class="medal">${medals[i]}</div>
                    <div class="podium-name">${user.username}</div>
                    <div class="podium-score">${Math.round(user.avgAttention || 0)}%</div>
                    <div class="podium-stats">
                        Level ${user.level || 1} • ${(user.points || 0).toLocaleString()} pts<br>
                        ${user.streak || 0} day streak
                    </div>
                </div>
            `).join('');
        }

        function displayLeaderboard(users) {
            const tbody = document.getElementById('leaderboard-tbody');
            tbody.innerHTML = users.map((user, i) => {
                const medal = i === 0 ? '1st' : i === 1 ? '2nd' : i === 2 ? '3rd' : `${i + 1}`;
                return `
                <tr>
                    <td class="rank">${medal}</td>
                    <td><strong>${user.username}</strong></td>
                    <td>Level ${user.level || 1}</td>
                    <td><strong>${Math.round(user.avgAttention || 0)}%</strong></td>
                    <td>${(user.points || 0).toLocaleString()}</td>
                    <td>${user.streak || 0} days</td>
                    <td>${user.totalSessions || 0}</td>
                    <td>${(user.badges || []).map(b => `<span class="badge-icon">${badges[b] || b}</span>`).join('')}</td>
                </tr>
            `}).join('');
        }

        loadLeaderboard();
    </script>
</body>
</html>
