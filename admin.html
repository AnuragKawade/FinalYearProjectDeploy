0<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        
        .admin-header { 
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 {
            font-size: 32px;
            color: #00d9ff;
            font-weight: 700;
        }
        .logout-btn {
            padding: 12px 24px;
            background: #00d9ff;
            color: #ffffff;
            border: 2px solid #00d9ff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: #33e3ff;
            border-color: #33e3ff;
            transform: translateY(-2px);
        }
        
        .stats-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card { 
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(0, 217, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #00d9ff;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00d9ff;
        }
        .stat-icon {
            font-size: 16px;
            margin-bottom: 15px;
            color: #00d9ff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-label {
            color: #505050;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .stat-value { 
            font-size: 42px;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .users-table { 
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .users-table h2 {
            margin-bottom: 20px;
            color: #00d9ff;
            font-size: 24px;
            font-weight: 700;
        }
        table { 
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        th, td { 
            padding: 16px;
            text-align: left;
        }
        th { 
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            color: #0a0a0a;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        th:first-child { border-radius: 10px 0 0 0; }
        th:last-child { border-radius: 0 10px 0 0; }
        
        tbody tr {
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            transition: background 0.2s;
            color: #0a0a0a;
        }
        tbody tr:hover {
            background: rgba(0, 217, 255, 0.1);
        }
        tbody tr:last-child td:first-child { border-radius: 0 0 0 10px; }
        tbody tr:last-child td:last-child { border-radius: 0 0 10px 0; }
        
        tbody td {
            color: #0a0a0a;
        }
        
        .badge { 
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-admin { 
            background: #ff4444;
            color: #ffffff;
        }
        .badge-user { 
            background: #00d9ff;
            color: #0a0a0a;
        }
        
        .action-btn {
            padding: 10px 20px;
            background: #00d9ff;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
            white-space: nowrap;
            min-width: 120px;
            text-align: center;
        }
        .action-btn:hover {
            background: #0099cc;
            transform: translateY(-2px);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stat-card, .users-table {
            animation: fadeIn 0.5s ease-out;
        }
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <div>
                <a href="leaderboard.html" class="logout-btn" style="margin-right: 10px; text-decoration: none;">Leaderboard</a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="total-users">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Sessions</div>
                <div class="stat-value" id="total-sessions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average Attention</div>
                <div class="stat-value" id="avg-attention">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Points</div>
                <div class="stat-value" id="total-points">0</div>
            </div>
        </div>

        <div class="users-table" style="margin-bottom: 30px;">
            <h2>Top Performers</h2>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Username</th>
                        <th>Level</th>
                        <th>Avg Attention</th>
                        <th>Points</th>
                        <th>Streak</th>
                        <th>Sessions</th>
                        <th>Badges</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-tbody"></tbody>
            </table>
        </div>

        <div class="users-table">
            <h2>All Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        console.log('Token:', token);
        console.log('Role:', role);

        if (!token || role !== 'admin') {
            alert('Admin access required');
            window.location.href = 'login.html';
        }

        async function loadData() {
            console.log('Loading admin data...');
            try {
                console.log('Fetching users...');
                const usersRes = await fetch(`${window.API_BASE_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const usersData = await usersRes.json();
                console.log('Users data:', usersData);

                console.log('Fetching sessions...');
                const sessionsRes = await fetch(`${window.API_BASE_URL}/api/sessions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const sessionsData = await sessionsRes.json();
                console.log('Sessions data:', sessionsData);

                console.log('Fetching leaderboard...');
                const leaderboardRes = await fetch(`${window.API_BASE_URL}/api/admin/leaderboard`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const leaderboardData = await leaderboardRes.json();
                console.log('Leaderboard data:', leaderboardData);

                console.log('Fetching stats...');
                const statsRes = await fetch(`${window.API_BASE_URL}/api/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const statsData = await statsRes.json();
                console.log('Stats data:', statsData);

                if (usersData.success) {
                    document.getElementById('total-users').textContent = usersData.users.length;
                    displayUsers(usersData.users);
                }

                if (sessionsData.success) {
                    document.getElementById('total-sessions').textContent = sessionsData.sessions.length;
                    const avgAtt = sessionsData.sessions.reduce((sum, s) => sum + (s.averageAttention || 0), 0) / sessionsData.sessions.length;
                    document.getElementById('avg-attention').textContent = Math.round(avgAtt || 0) + '%';
                }

                if (statsData.success) {
                    document.getElementById('total-points').textContent = statsData.stats.totalPoints.toLocaleString();
                }

                if (leaderboardData.success) {
                    displayLeaderboard(leaderboardData.leaderboard);
                }
            } catch (error) {
                console.error('Error loading data:', error);
                alert('Error loading data. Check console.');
            }
        }

        function displayUsers(users) {
            console.log('Displaying users:', users);
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td><span class="badge badge-${user.role}">${user.role}</span></td>
                    <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                    <td><button onclick="viewUserSessions('${user._id}')" class="action-btn">View Sessions</button></td>
                </tr>
            `).join('');
        }

        function displayLeaderboard(users) {
            console.log('Displaying leaderboard:', users);
            const badges = {
                '7-day-streak': 'Streak',
                '30-day-streak': 'Long Streak',
                'focus-master': 'Focus Master',
                'perfect-score': 'Perfect',
                '1k-points': '1K Points',
                '5k-points': '5K Points',
                'dedicated': 'Dedicated',
                'veteran': 'Veteran',
                '10-hour-club': '10 Hour Club',
                'level-10': 'Level 10'
            };
            const tbody = document.getElementById('leaderboard-tbody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#666;">No data yet. Users need to complete sessions.</td></tr>';
                return;
            }
            tbody.innerHTML = users.map((user, i) => {
                const medal = i === 0 ? '1st' : i === 1 ? '2nd' : i === 2 ? '3rd' : `${i + 1}`;
                return `
                <tr>
                    <td style="font-size: 20px;">${medal}</td>
                    <td><strong>${user.username}</strong></td>
                    <td>Lvl ${user.level || 1}</td>
                    <td>${Math.round(user.avgAttention || 0)}%</td>
                    <td>${(user.points || 0).toLocaleString()}</td>
                    <td>${user.streak || 0} days</td>
                    <td>${user.totalSessions || 0}</td>
                    <td>${(user.badges || []).map(b => badges[b] || b).join(' ')}</td>
                </tr>
            `}).join('');
        }

        function viewUserSessions(userId) {
            window.location.href = `user-sessions.html?userId=${userId}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        loadData();
    </script>
</body>
</html
